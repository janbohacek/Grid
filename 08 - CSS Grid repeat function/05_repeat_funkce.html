<!DOCTYPE html>
<html lang="cs">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../assets/style.css">
	<title>CSS Grid funkce repeat</title>
</head>

<body>
	<div class="container">
		<div class="item"><p>1</p></div>
		<div class="item"><p>2</p></div>
		<div class="item"><p>3</p></div>
		<div class="item"><p>4</p></div>
		<div class="item"><p>5</p></div>
		<div class="item"><p>6</p></div>
		<div class="item"><p>7</p></div>
		<div class="item"><p>8</p></div>
		<div class="item"><p>9</p></div>
		<div class="item"><p>10</p></div>
		<div class="item"><p>11</p></div>
		<div class="item"><p>12</p></div>
		<div class="item"><p>13</p></div>
		<div class="item"><p>14</p></div>
		<div class="item"><p>15</p></div>
	</div>

	<style>
		.container {
			display: grid;
			grid-gap: 20px;

			grid-template-columns: repeat(5, 1fr); /* Namísto toho, abychom museli psát 1fr 1fr 1fr 1fr 1fr, můžeme použít funkci repeat, která nám umožňuje zkrátit zápis */

			/* grid-template-columns: 100px repeat(2, 1fr auto) 200px repeat(2, 5fr);  */
			/* Toto rozložení má 8 sloupců. */
		}
	</style>
</body>

</html>
