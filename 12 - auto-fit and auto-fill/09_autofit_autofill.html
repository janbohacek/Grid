	<style>
		.container {
			display: grid;
			grid-gap: 20px;
			border: 10px solid var(--yellow);
			/* grid-template-columns: repeat(auto-fit, 150px); */

			/* Auto-fill vytvoří tolik sloupců, kolik se jich vejde, i když nejsou všechny obsazené. Auto-fit se chová stejně jako auto-fill, ale pokud jsou nějaké sloupce prázdné, zruší je a roztáhne ostatní sloupce na celou šířku mřížky. */
			grid-template-columns: repeat(auto-fill, 150px);

			/* Mnohem lepé pochopitelné to bude, až se bude používat minmax funkce, ale prozatím se zaměřme na rozdíl mezi auto-fit a auto-fill. */

		}
