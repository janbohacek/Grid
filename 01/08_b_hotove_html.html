<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/style.css">
    <title>Umisťování prvků v CSS Grid</title>
</head>

<body>
    <div class="container">
        <div class="item item1"><p>1</p></div>
        <div class="item item2"><p>2</p></div>
        <div class="item item3"><p>3</p></div>
        <div class="item item4"><p>4</p></div>
        <div class="item item5"><p>5</p></div>
        <div class="item item6"><p>6</p></div>
        <div class="item item7"><p>7</p></div>
        <div class="item item8"><p>8</p></div>
        <div class="item poop"><p>💩</p></div>
        <div class="item item9"><p>9</p></div>
        <div class="item item10"><p>10</p></div>
        <div class="item item11"><p>11</p></div>
        <div class="item item12"><p>12</p></div>
        <div class="item item13"><p>13</p></div>
        <div class="item item14"><p>14</p></div>
        <div class="item item15"><p>15</p></div>
        <div class="item item16"><p>16</p></div>
        <div class="item item17"><p>17</p></div>
        <div class="item item18"><p>18</p></div>
        <div class="item item19"><p>19</p></div>
        <div class="item item20"><p>20</p></div>
        <div class="item item21"><p>21</p></div>
        <div class="item item22"><p>22</p></div>
        <div class="item item23"><p>23</p></div>
        <div class="item item24"><p>24</p></div>
        <div class="item item25"><p>25</p></div>
        <div class="item item26"><p>26</p></div>
        <div class="item item27"><p>27</p></div>
        <div class="item item28"><p>28</p></div>
        <div class="item item29"><p>29</p></div>
        <div class="item item30"><p>30</p></div>
    </div>

    <style>
        .container {
            display: grid;
            grid-gap: 20px;
            grid-template-columns: repeat(5, 1fr 2fr);
            grid-template-rows: repeat(10, 50px);
        }

        /* U položky 1 začni na sloupci 3 a pokračuj do 5 */
        /* U položky 2 začni na sloupci 5 a pokračuj až na konec */
        /* Nastav položku 5 tak, aby zabírala 2 sloupce i 2 řádky */
        /* Nastav položku 8 na výšku dvou řádků */
        /* Nastav položku 15 tak, aby zabírala celou šířku mřížky */
        /* Nastav položku 18 tak, aby zabírala šířku 4 sloupců, ale končila na 9 */
        /* Nastav položku 20 tak, aby začínala na řádku 4 a měla výšku 3 řádků */

        .item1 {
        grid-column: 3 / 5;
        }
        .item2 {
        grid-column: 5 / -1;
        }
        .item5 {
        grid-column: span 2;
        grid-row: span 2;
        }
        .item8 {
        grid-row: span 2;
        }
        .item15 {
        grid-column: 1 / -1;
        }
        .item18 {
        grid-column: span 4 / 9;
        }

        .item20 {
        grid-row: 4 / span 3;
        }
    </style>
</body>

</html>
