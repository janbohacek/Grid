<!DOCTYPE html>
<html lang="cs">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../assets/style.css">
	<title>CSS Grid Implicit vs Explicit Tracks</title>
</head>

<body>
<div class="container">
	<div class="item"><p>1</p></div>
	<div class="item"><p>2</p></div>
	<div class="item"><p>3</p></div>
	<div class="item"><p>4</p></div>

	<!-- <div class="item"><p>5</p></div>
	<div class="item"><p>6</p></div>
	<div class="item"><p>7</p></div>
	<div class="item"><p>8</p></div> -->
</div>

<style>
	.container {
		display: grid;
		grid-gap: 20px;
		grid-template-columns: 200px 400px;
		grid-template-rows: 100px 150px;

		/* Grid-auto-rows a grid-auto-columns nám umožňují definovat implicitní velikost řádků a sloupců, které se vytvoří, pokud do gridu umístíme více položek, než kolik jsme explicitně definovali pomocí grid-template-columns a grid-template-rows. Pokud tedy přidáme další položky do gridu, které přesahují počet explicitně definovaných řádků a sloupců, budou tyto položky umístěny do implicitních řádků a sloupců s velikostí určenou vlastnostmi grid-auto-rows a grid-auto-columns, což je v našem případě 100px pro obě vlastnosti */

		/* grid-auto-rows: 100px;
		grid-auto-columns: 100px; */
	}
</style>
</body>

</html>
