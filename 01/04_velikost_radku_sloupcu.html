<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/style.css">
    <title>Sizing Tracks in CSS Grid!</title>
</head>

<body>
    <div class="container">
        <div class="item"><p>1</p></div>
        <div class="item"><p>2</p></div>
        <div class="item"><p>Wes Bos je borec!</p></div>
        <div class="item"><p>4</p></div>
        <div class="item"><p>5</p></div>
        <div class="item"><p>6</p></div>
        <div class="item"><p>7</p></div>
        <div class="item"><p>8</p></div>
        <div class="item"><p>9</p></div>
        <div class="item"><p>10</p></div>
        <div class="item"><p>11</p></div>
        <div class="item"><p>12</p></div>
        <div class="item"><p>13</p></div>
        <div class="item"><p>14</p></div>
        <div class="item"><p>15</p></div>
    </div>

    <style>
        .container {
            display: grid;
            grid-gap: 20px;
            border: 10px solid var(--yellow);

            /* 1fr vs auto - auto znamená, že velikost řádku nebo sloupce bude určena jeho obsahem, zatímco 1fr znamená, že řádek nebo sloupec zabere zbylý prostor v gridu. Pokud tedy použijeme auto pro první a třetí sloupec a 1fr pro druhý a čtvrtý sloupec, první a třetí sloupec budou mít velikost určenou svým obsahem, zatímco druhý a čtvrtý sloupec se roztáhnou, aby zabraly zbylý prostor v gridu. To nám umožňuje vytvořit flexibilní rozvržení, které se přizpůsobí obsahu a dostupnému prostoru v gridu. */

            grid-template-columns: auto 1fr auto 1fr;
            
            /* grid-template-columns: 600px 1fr 150px 1fr;  */
            /* grid-template-columns: 150px 150px; */



        }
    </style>
</body>

</html>
